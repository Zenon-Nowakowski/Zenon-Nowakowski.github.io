<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>::Modern Regsiter Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.2/css/all.css"
        integrity="sha384-/rXc/GQVaYpyDdyxK+ecHPVYJSN9bmVFBvjA/9eOB+pb3F2w2N6fc5qB9Ew5yIns" crossorigin="anonymous">
</head>

<body>

    <div class="mobile-wrapper">
        <div class="login-wrapper">

            <div class="brand-logo">
                myPocketPantry<span></span>
                <img src="https://images.vexels.com/media/users/3/213392/isolated/lists/efda120ef79225437928335e2f961144-pantry-label-chocolate-chips.png"
                    height="175px" width="175px" alt="Pocket Pantry Logo">
            </div>
            <div class="form-wrapper">
                <form action="#">
                    <div class="input-group">
                        <label for="email"><i class="fas fa-user"></i></label>
                        <input type="email" placeholder="E-MAIL" name="email" id="email">
                    </div>
                    <div class="input-group">
                        <label for="password"><i class="fas fa-unlock-alt"></i></label>
                        <input type="password" placeholder="PASSWORD" name="password" id="password">
                    </div>
                    <button onclick="window.location.href='menu.html'" ;>LOGIN</button>
                </form>
            </div>

        </div>

        <div class="help-text">forgot password ?</div>

    </div>

</body>

</html>
